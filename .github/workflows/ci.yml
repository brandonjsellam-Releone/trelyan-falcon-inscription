name: trelyan-pq CI

on:
  push:
    paths: ["sdk/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["sdk/**", ".github/workflows/ci.yml"]
  schedule:
    - cron: "23 6 * * 1"   # Mondays 06:23 UTC — continuous proof the deployed app still verifies
  workflow_dispatch: {}

jobs:
  wire-format:
    name: Wire-format tests (no network, no native lib)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (dev extra) and run the wire-format + golden-vector suite
        working-directory: sdk
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest tests -v

  verify-live:
    name: Live TestNet verification (read-only, no secrets)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install the published package from PyPI and verify the deployed app
        run: |
          python -m pip install --upgrade pip
          pip install trelyan-pq
          python sdk/examples/verify_trelyan.py
        # 14 checks: package constants, pinned golden vectors, live app 763809096
        # (bytecode fingerprint), on-chain Falcon key + inscription record, and a
        # byte-exact local rebuild of the domain-separated message. Exits non-zero
        # on any failure. No account, no mnemonic, no secrets.

  signature-kat:
    name: Signature byte-identity KAT (pinned Falcon build, 3 OSes)
    # Build-divergence control (reviewer Q11/Q7): the SAME committed golden signatures must be
    # reproduced byte-for-byte on Linux, macOS, and Windows. Skips cleanly until the fixture
    # (tests/vectors/det1024_kat.json) is generated and committed (see gen_det1024_kat.py).
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch pinned Falcon source (commit ce15e75…, tarball = byte-exact to the pin)
        shell: bash
        # Use the GitHub source TARBALL, not `git clone`: a clone applies the runner's
        # core.autocrlf, which on some runners rewrites the C sources LF→CRLF and changes
        # their bytes (deterministic.c → e005ebda instead of the pinned 601390dc), failing
        # the digest gate below for a non-substantive reason. The tarball is LF on every OS
        # and is exactly what the pin (and verify.html) were computed from.
        run: |
          curl -sL https://github.com/algorand/falcon/archive/ce15e75bceb372867daf6b8e81918ab6978686eb.tar.gz | tar xz
          mv falcon-ce15e75bceb372867daf6b8e81918ab6978686eb falcon-src

      - name: Assert pinned-build digest + emulated FP backend (fail fast if upstream drifted)
        shell: bash
        # Verifies tree digest c6adf48…, deterministic.c 601390dc…, AND that config.h pins
        # FALCON_FPEMU=1 / FALCON_FPNATIVE=0 — the precondition that makes cross-platform
        # byte-identity sound (bit-exact integer FP). Drift here fails the job.
        run: python sdk/ci/verify_pinned_digest.py falcon-src

      - name: Record toolchain (for the fixture/run audit trail)
        shell: bash
        run: |
          echo "OS: ${{ runner.os }} / $(uname -a 2>/dev/null || echo windows)"
          (cc --version 2>/dev/null | head -1) || true
          python --version

      # Sanitizer GATE (Linux): proves the shipped portable build (-DFALCON_UNALIGNED=0 -fno-strict-aliasing)
      # is free of the misaligned-uint64 load at inner.h:846 AND of any other runtime-UB class, across a
      # BROAD surface (keygen+sign+verify+reject over 2 keypairs x {0,9,100,4096}-byte messages — not a
      # single happy path), AND that the alignment gate is non-vacuous (the DEFAULT autodetected build
      # still traps on x86_64). See FALCON_BUILD_HARDENING §2. printf-built driver avoids YAML-heredoc pitfalls.
      - name: Sanitizer gate (portable build is alignment- and UBSan-clean; default build traps)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd falcon-src
          printf '%s\n' \
            '#include <stdio.h>' '#include <string.h>' '#include "deterministic.h"' \
            'static int one(unsigned sb,const unsigned char*msg,size_t ml){' \
            ' shake256_context r; unsigned char sd[32]; memset(sd,(int)sb,sizeof sd);' \
            ' shake256_init(&r); shake256_inject(&r,sd,sizeof sd); shake256_flip(&r);' \
            ' unsigned char sk[FALCON_DET1024_PRIVKEY_SIZE], pk[FALCON_DET1024_PUBKEY_SIZE];' \
            ' if(falcon_det1024_keygen(&r,sk,pk)) return 11;' \
            ' unsigned char s[FALCON_DET1024_SIG_COMPRESSED_MAXSIZE]; size_t n=sizeof s;' \
            ' if(falcon_det1024_sign_compressed(s,&n,sk,msg,ml)) return 12;' \
            ' if(falcon_det1024_verify_compressed(s,n,pk,msg,ml)) return 13;' \
            ' s[n/2]^=0xFF; if(falcon_det1024_verify_compressed(s,n,pk,msg,ml)==0) return 14;' \
            ' return 0; }' \
            'int main(void){ static unsigned char b[4096]; size_t i;' \
            ' for(i=0;i<sizeof b;i++) b[i]=(unsigned char)(i*131u+7u);' \
            ' size_t L[]={0,9,100,4096}; int t=0; unsigned k; size_t j;' \
            ' for(k=0;k<2;k++) for(j=0;j<4;j++){ int rc=one(0x10+k,b,L[j]);' \
            '   if(rc){ fprintf(stderr,"FAIL k=%u len=%zu rc=%d\n",k,L[j],rc); return rc; } t++; }' \
            ' printf("OK %d cases keygen+sign+verify+reject\n",t); return 0; }' > _san_probe.c
          SRC="codec.c common.c falcon.c fft.c fpr.c keygen.c rng.c shake.c sign.c vrfy.c deterministic.c _san_probe.c"
          # (1) portable build: ZERO misaligned-load diagnostics across the full surface
          cc -DFALCON_UNALIGNED=0 -O0 -g -fsanitize=alignment -fno-sanitize-trap=alignment -o san_align $SRC
          OUT0=$(./san_align 2>&1); echo "alignment/portable: $OUT0"
          echo "$OUT0" | grep -qi "misaligned" && { echo "FAIL: portable build STILL misaligned"; exit 1; }
          echo "$OUT0" | grep -q "OK .* cases" || { echo "FAIL: portable build did not complete the surface"; exit 1; }
          # (2) portable build: ZERO runtime-UB of ANY class under full UBSan + -fno-strict-aliasing
          cc -DFALCON_UNALIGNED=0 -fno-strict-aliasing -O0 -g -fsanitize=undefined -fno-sanitize-trap=undefined -o san_ub $SRC
          OUT2=$(./san_ub 2>&1); echo "ubsan/portable: $(echo "$OUT2" | tail -1)"
          N=$(echo "$OUT2" | grep -ic "runtime error" || true); echo "UBSan runtime-error lines: $N"   # || true: grep exits 1 on 0 matches (the clean case) and would abort set -e
          [ "$N" = "0" ] || { echo "FAIL: residual UB under -fsanitize=undefined"; echo "$OUT2" | grep -i "runtime error" | head; exit 1; }
          # (3) gate must be REAL: the DEFAULT autodetected build MUST trap on x86_64 (else the test proves nothing)
          if [ "$(uname -m)" = "x86_64" ]; then
            cc -O0 -g -fsanitize=alignment -fno-sanitize-trap=alignment -o san_default $SRC
            OUT1=$(./san_default 2>&1 || true); echo "default: $(echo "$OUT1" | grep -i misaligned | head -1)"
            echo "$OUT1" | grep -qi "misaligned" || { echo "FAIL: gate vacuous — default build did NOT trap"; exit 1; }
            echo "default build traps as expected -> gate is non-vacuous"
          fi
          echo "SANITIZER GATE PASSED (alignment-clean + UBSan-clean over the full sign/verify surface)"

      # --- build the deterministic Falcon-1024 shared library, per OS ---
      # The pinned config.h already pins the emulated FP backend (FALCON_FPEMU=1); do NOT add
      # -ffast-math or -DFALCON_FPNATIVE — either would break the byte-identity the KAT asserts.
      # -DFALCON_UNALIGNED=0 selects upstream's portable byte-wise PRNG read instead of the misaligned
      # uint64 fast path (inner.h:846) — eliminates the alignment UB; -fno-strict-aliasing makes the
      # remaining FALCON_LE type-punning casts (e.g. rng.c) safe against TBAA mis-compilation. Both are
      # PROVEN byte-identical to the goldens (see FALCON_BUILD_HARDENING §2) — they are -D/-f flags, not
      # source edits, so the pinned tree digest is unchanged. The sanitizer gate above enforces this build
      # stays alignment- and UBSan-clean. (MSVC omits -fno-strict-aliasing: cl does not assume strict TBAA.)
      - name: Build shared library (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd falcon-src
          EXT=so; [ "$(uname)" = "Darwin" ] && EXT=dylib
          cc -O3 -fPIC -DFALCON_UNALIGNED=0 -fno-strict-aliasing -shared -o "libfalcondet1024.$EXT" \
            codec.c common.c falcon.c fft.c fpr.c keygen.c rng.c shake.c sign.c vrfy.c deterministic.c
          echo "FALCON_DET1024_LIB=$PWD/libfalcondet1024.$EXT" >> "$GITHUB_ENV"

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build shared library (Windows / MSVC)
        if: runner.os == 'Windows'
        shell: cmd
        # /fp:precise is MSVC's default (NOT /fp:fast) — keep it so FP semantics match.
        run: |
          cd falcon-src
          cl /O2 /LD /DFALCON_UNALIGNED=0 /Fe:falcondet1024.dll ^
            codec.c common.c falcon.c fft.c fpr.c keygen.c rng.c shake.c sign.c vrfy.c deterministic.c
          echo FALCON_DET1024_LIB=%CD%\falcondet1024.dll>> %GITHUB_ENV%

      - name: Install SDK (dev extra)
        working-directory: sdk
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run the signature KAT (byte-identity vs the committed golden)
        working-directory: sdk
        shell: bash
        # TRELYAN_REQUIRE_KAT=1 makes the job FAIL (not skip) if the fixture is still the sentinel,
        # so a "passing" 3-OS run can never silently mean the KAT was skipped.
        env:
          TRELYAN_REQUIRE_KAT: "1"
        run: pytest tests/test_signature_kat.py -v

  testnet-e2e:
    name: TestNet end-to-end (manual; needs DEPLOYER_MNEMONIC secret + generated client)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build the deterministic Falcon-1024 shared library
        run: |
          git clone --depth 1 https://github.com/algorand/falcon
          cd falcon
          cc -O3 -fPIC -DFALCON_UNALIGNED=0 -fno-strict-aliasing -shared -o libfalcondet1024.so \
            codec.c common.c falcon.c fft.c fpr.c keygen.c rng.c shake.c sign.c vrfy.c deterministic.c
          echo "FALCON_DET1024_LIB=$PWD/libfalcondet1024.so" >> "$GITHUB_ENV"
      - name: Install SDK with the Algorand extra
        working-directory: sdk
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[algorand,dev]"
      - name: Reproducible TestNet inscribe (prints app + asset IDs to the run log)
        working-directory: sdk
        env:
          DEPLOYER_MNEMONIC: ${{ secrets.DEPLOYER_MNEMONIC }}
        run: |
          # Requires the generated typed client (trelyan_client.py) importable on PYTHONPATH,
          # produced from the contract ARC-56:  algokit generate client ... --output trelyan_client.py
          # Copy it next to examples/ or add contracts/ to PYTHONPATH, then:
          PYTHONPATH="src:../contracts:." python examples/quickstart.py
