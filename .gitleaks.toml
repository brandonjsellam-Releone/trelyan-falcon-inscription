# gitleaks config — trelyan-falcon-inscription
#
# Path-scoped allow-list (NOT a blanket secret exemption — a real leaked secret anywhere else still
# trips the scanner):
#   1. The known-answer-test (KAT) fixture, which by design carries a committed TEST-ONLY Falcon-1024
#      private key (a NIST-style public test vector — see SECURITY.md -> "Test vectors"). Bound to no
#      Cell, never used on-chain, never produced via the sign-once-destroy path.
#   2. The generated ARC56 client + contract spec: gitleaks' generic-api-key heuristic fires on their
#      JSON "key": "<base64>" fields, but those are on-chain STATE-VARIABLE NAMES (the global/box
#      state schema), not secrets. Both are auto-generated by `algokit generate client`.

title = "trelyan-falcon-inscription"

[extend]
useDefault = true

[allowlist]
description = "Path-scoped: committed KAT test vector + generated ARC56 client/spec (state-key names, not secrets). See SECURITY.md."
paths = [
  '''sdk/tests/vectors/det1024_kat\.json''',
  '''contracts/out/.*\.arc56\.json''',
  '''contracts/trelyan_client\.py''',
]
