# gitleaks config — trelyan-falcon-inscription
#
# The ONLY allow-listed item is the known-answer-test (KAT) fixture, which by design carries a
# committed TEST-ONLY Falcon-1024 private key (a NIST-style public test vector — see SECURITY.md →
# "Test vectors"). It is bound to no Cell, never used on-chain, and never produced via the
# sign-once-destroy path. This is a NARROW, path-scoped allow — NOT a blanket private-key exemption,
# so a real leaked secret anywhere else still trips the scanner.

title = "trelyan-falcon-inscription"

[extend]
useDefault = true

[allowlist]
description = "Committed KAT test vector (public test-only key by design). See SECURITY.md."
paths = [
  '''sdk/tests/vectors/det1024_kat\.json''',
]
